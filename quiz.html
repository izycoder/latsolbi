<html lang="id">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f3ee;
      --bg-2: #efe7dc;
      --ink: #181611;
      --muted: #5d5a50;
      --card: #ffffff;
      --line: #e5ded3;
      --accent: #0f766e;
      --accent-2: #d97706;
      --accent-3: #1d4ed8;
      --good: #15803d;
      --bad: #b91c1c;
      --shadow: 0 18px 40px rgba(30, 26, 18, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 12% -8%, #f9e5be 0%, rgba(249, 229, 190, 0) 65%),
        radial-gradient(900px 500px at 90% -10%, #c7efe6 0%, rgba(199, 239, 230, 0) 60%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      padding: 28px 20px 10px;
    }

    .hero {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px 26px;
      box-shadow: var(--shadow);
    }

    .hero-kicker {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .hero h1 {
      font-family: "Fraunces", serif;
      font-size: clamp(1.6rem, 3.6vw, 2.6rem);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .hero p {
      color: var(--muted);
      font-size: 14px;
      max-width: 620px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--card);
      padding: 10px 16px;
      border-radius: 10px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn.primary {
      background: linear-gradient(120deg, var(--accent), #14b8a6);
      color: #fff;
      border-color: transparent;
    }

    .btn.primary:hover {
      filter: brightness(1.05);
      color: #fff;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 70px;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 22px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 26px rgba(24, 22, 17, 0.08);
    }

    .panel-title {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(36px, 1fr));
      gap: 8px;
    }

    .nav-btn {
      border: 1px solid var(--line);
      background: #fbfaf7;
      border-radius: 8px;
      padding: 8px 0;
      font-size: 12px;
      font-family: "JetBrains Mono", monospace;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      border-color: var(--accent-2);
      color: var(--accent-2);
    }

    .nav-btn.current {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.12);
    }

    .nav-btn.answered.correct {
      background: #e7f6ef;
      border-color: #16a34a;
      color: #166534;
    }

    .nav-btn.answered.incorrect {
      background: #fdecec;
      border-color: #ef4444;
      color: #9f1239;
    }

    .legend {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      display: grid;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.current { background: var(--accent); }
    .dot.correct { background: #16a34a; }
    .dot.incorrect { background: #ef4444; }
    .dot.unanswered { background: #d1c7b9; }

    .quiz-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .quiz-question {
      font-family: "Fraunces", serif;
      font-size: clamp(1.2rem, 2.4vw, 1.7rem);
      margin-bottom: 14px;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .opt-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--line);
      background: #fcfbf8;
      border-radius: 12px;
      padding: 12px 14px;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .opt-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 6px 16px rgba(15, 118, 110, 0.12);
    }

    .opt-btn:disabled {
      cursor: default;
      box-shadow: none;
    }

    .opt-btn.correct {
      border-color: #22c55e;
      background: #ecfdf3;
    }

    .opt-btn.wrong {
      border-color: #f87171;
      background: #fef2f2;
    }

    .opt-btn.selected {
      outline: 2px solid rgba(29, 78, 216, 0.2);
    }

    .opt-label {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #f2ede4;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "JetBrains Mono", monospace;
      font-weight: 600;
      font-size: 12px;
    }

    .opt-text {
      flex: 1;
    }

    .explain {
      border-left: 4px solid var(--accent-3);
      background: #f3f6ff;
      padding: 12px 14px;
      border-radius: 12px;
      display: grid;
      gap: 6px;
      margin-bottom: 18px;
    }

    .explain.hidden {
      display: none;
    }

    .explain-title {
      font-weight: 600;
      color: #1e3a8a;
    }

    .quiz-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn.ghost {
      background: transparent;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hero {
        text-align: left;
      }
    }
  </style>
</head>

        <div class="explain hidden" id="explain" role="status" aria-live="polite"></div>
        <div class="quiz-actions">
          <button class="btn ghost" id="prevBtn">Sebelumnya</button>
          <button class="btn" id="nextBtn">Berikutnya</button>
          <button class="btn" id="resetBtn">Reset</button>
        </div>
      </section>
    </div>
  </main>

        explain: "Transparency menekankan agar sistem dapat dijelaskan dan dipahami."

    const state = {
      current: 0,
      answers: Array(questions.length).fill(null)
    };

    const navGrid = document.getElementById("navGrid");
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const explainEl = document.getElementById("explain");
    const progressEl = document.getElementById("progress");
    const statusEl = document.getElementById("status");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");
    const resetTop = document.getElementById("resetTop");

    const navButtons = [];

    function buildNav() {
      questions.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "nav-btn";
        btn.textContent = index + 1;
        btn.addEventListener("click", () => {
          state.current = index;
          render();
        });
        navGrid.appendChild(btn);
        navButtons.push(btn);
      });
    }

    function getLabel(index) {
      return String.fromCharCode(65 + index);
    }

    function updateNavGrid() {
      navButtons.forEach((btn, index) => {
        btn.className = "nav-btn";
        if (index === state.current) {
          btn.classList.add("current");
        }
        const answer = state.answers[index];
        if (answer !== null) {
          btn.classList.add("answered");
          const isCorrect = answer === questions[index].answer;
          btn.classList.add(isCorrect ? "correct" : "incorrect");
        }
      });
    }

    function updateExplain() {
      const currentAnswer = state.answers[state.current];
      if (currentAnswer === null) {
        explainEl.classList.add("hidden");
        explainEl.innerHTML = "";
        statusEl.textContent = "Belum dijawab";
        return;
      }

      const q = questions[state.current];
      const correctLabel = getLabel(q.answer);
      const isCorrect = currentAnswer === q.answer;
      statusEl.textContent = isCorrect ? "Jawabanmu benar" : "Jawabanmu belum benar";

      explainEl.classList.remove("hidden");
      explainEl.innerHTML = `
        <div class="explain-title">${isCorrect ? "Jawabanmu benar." : "Jawabanmu belum benar."}</div>
        <div>Jawaban benar: ${correctLabel}. ${q.options[q.answer]}</div>
        <div>${q.explain}</div>
      `;
    }

    function renderOptions() {
      optionsEl.innerHTML = "";
      const q = questions[state.current];
      const currentAnswer = state.answers[state.current];

      q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "opt-btn";
        btn.innerHTML = `<span class="opt-label">${getLabel(index)}</span><span class="opt-text">${option}</span>`;

        if (currentAnswer === null) {
          btn.addEventListener("click", () => selectOption(index));
        } else {
          btn.disabled = true;
          if (index === q.answer) {
            btn.classList.add("correct");
          }
          if (index === currentAnswer && index !== q.answer) {
            btn.classList.add("wrong");
          }
          if (index === currentAnswer) {
            btn.classList.add("selected");
          }
        }

        optionsEl.appendChild(btn);
      });
    }

    function render() {
      const q = questions[state.current];
      questionEl.textContent = q.question;
      progressEl.textContent = `Soal ${state.current + 1} dari ${questions.length}`;
      prevBtn.disabled = state.current === 0;
      nextBtn.disabled = state.current === questions.length - 1;
      renderOptions();
      updateExplain();
      updateNavGrid();
    }

    function selectOption(index) {
      if (state.answers[state.current] !== null) {
        return;
      }
      state.answers[state.current] = index;
      render();
    }

    function resetQuiz() {
      state.current = 0;
      state.answers = Array(questions.length).fill(null);
      render();
    }

    prevBtn.addEventListener("click", () => {
      if (state.current > 0) {
        state.current -= 1;
        render();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (state.current < questions.length - 1) {
        state.current += 1;
        render();
      }
    });

    resetBtn.addEventListener("click", resetQuiz);
    resetTop.addEventListener("click", resetQuiz);

    buildNav();
    render();
  </script>
