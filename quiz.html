      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Source Sans 3", sans-serif;
      color: var(--ink);
      background: var(--bg);

    a {

    }

    header {

    }

      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px 22px;
      box-shadow: var(--shadow);
    }

    .hero-kicker {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-bottom: 8px;
    }

    .hero h1 {
      font-family: "Source Sans 3", sans-serif;
      font-size: clamp(1.5rem, 3.2vw, 2.2rem);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .hero p {
      color: var(--muted);
      font-size: 14px;
      max-width: 620px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--card);
      padding: 10px 16px;
      border-radius: 6px;
      font-family: "Source Sans 3", sans-serif;
      font-size: 12px;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .btn.primary:hover {
      filter: brightness(1.05);
      color: #fff;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 70px;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 22px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .panel-title {
      font-family: "Source Sans 3", sans-serif;
      font-size: 12px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(36px, 1fr));
      gap: 8px;
    }

    .nav-btn {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 4px;
      padding: 7px 0;
      position: relative;
      font-size: 12px;
      font-family: "Source Sans 3", sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .nav-btn.current {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    .nav-btn.answered.correct {
      background: #e7f6ef;
      border-color: var(--good);
      color: var(--good);
    }

    .nav-btn.answered.incorrect {
      background: #fdecec;
      border-color: var(--bad);
      color: var(--bad);
    }

    .nav-btn.answered.correct::after,
    .nav-btn.answered.incorrect::after {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 10px;
      font-weight: 700;
    }

    .nav-btn.answered.correct::after {
      content: "✓";
    }

    .nav-btn.answered.incorrect::after {
      content: "✕";
    }

    .legend {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      display: grid;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.current { background: var(--accent); }
    .dot.correct { background: #16a34a; }
    .dot.incorrect { background: #ef4444; }
    .dot.unanswered { background: #d1c7b9; }

      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      font-family: "Source Sans 3", sans-serif;
      font-size: 12px;
      color: var(--muted);

      margin-bottom: 12px;
      background: var(--accent-3);
      border: 1px solid #cbdff4;
      border-radius: 6px;
      padding: 12px 14px;

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .opt-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--line);
      background: #fcfbf8;
      border-radius: 6px;
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .opt-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 3px 10px rgba(37, 99, 235, 0.12);
    }

    .opt-btn:disabled {
      cursor: default;
      box-shadow: none;
    }

    .opt-btn.correct {
      border-color: var(--good);
      background: #e7f6ef;
    }

    .opt-btn.wrong {
      border-color: var(--bad);
      background: #fdecec;
    }

    .opt-btn.selected {
      outline: 2px solid rgba(37, 99, 235, 0.18);
    }

    .opt-label {
      width: auto;
      height: auto;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 13px;
    }

    .opt-text {
      flex: 1;
    }

    .explain {
      border-left: 4px solid #f0b429;
      background: #fff8e1;
      padding: 12px 14px;
      border-radius: 6px;
      display: grid;
      gap: 6px;
      margin-bottom: 18px;
    }

    .explain.hidden {
      display: none;
    }

    .explain-title {
      font-weight: 600;
      color: #8a5a00;
    }

    .quiz-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn.ghost {
      background: transparent;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hero {
        text-align: left;
      }
    }

    const state = {
      current: 0,
      answers: Array(questions.length).fill(null)
    };

    const navGrid = document.getElementById("navGrid");
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const explainEl = document.getElementById("explain");
    const progressEl = document.getElementById("progress");
    const statusEl = document.getElementById("status");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");
    const resetTop = document.getElementById("resetTop");

    const navButtons = [];

    function buildNav() {
      questions.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "nav-btn";
        btn.textContent = index + 1;
        btn.addEventListener("click", () => {
          state.current = index;
          render();
        });
        navGrid.appendChild(btn);
        navButtons.push(btn);
      });
    }

    function getLabel(index) {
      return String.fromCharCode(97 + index);
    }

    function updateNavGrid() {
      navButtons.forEach((btn, index) => {
        btn.className = "nav-btn";
        if (index === state.current) {
          btn.classList.add("current");
        }
        const answer = state.answers[index];
        if (answer !== null) {
          btn.classList.add("answered");
          const isCorrect = answer === questions[index].answer;
          btn.classList.add(isCorrect ? "correct" : "incorrect");
        }
      });
    }

    function updateExplain() {
      const currentAnswer = state.answers[state.current];
      if (currentAnswer === null) {
        explainEl.classList.add("hidden");
        explainEl.innerHTML = "";
        statusEl.textContent = "Belum dijawab";
        return;
      }

      const q = questions[state.current];
      const correctLabel = getLabel(q.answer);
      const isCorrect = currentAnswer === q.answer;
      statusEl.textContent = isCorrect ? "Jawabanmu benar" : "Jawabanmu belum benar";

      explainEl.classList.remove("hidden");
      explainEl.innerHTML = `
        <div class="explain-title">${isCorrect ? "Jawabanmu benar." : "Jawabanmu belum benar."}</div>
        <div>Jawaban benar: ${correctLabel}. ${q.options[q.answer]}</div>
        <div>${q.explain}</div>
      `;
    }

    function renderOptions() {
      optionsEl.innerHTML = "";
      const q = questions[state.current];
      const currentAnswer = state.answers[state.current];

      q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "opt-btn";
        btn.innerHTML = `<span class="opt-label">${getLabel(index)}.</span><span class="opt-text">${option}</span>`;

        if (currentAnswer === null) {
          btn.addEventListener("click", () => selectOption(index));
        } else {
          btn.disabled = true;
          if (index === q.answer) {
            btn.classList.add("correct");
          }
          if (index === currentAnswer && index !== q.answer) {
            btn.classList.add("wrong");
          }
          if (index === currentAnswer) {
            btn.classList.add("selected");
          }
        }

        optionsEl.appendChild(btn);
      });
    }

    function render() {
      const q = questions[state.current];
      questionEl.textContent = q.question;
      progressEl.textContent = `Soal ${state.current + 1} dari ${questions.length}`;
      prevBtn.disabled = state.current === 0;
      nextBtn.disabled = state.current === questions.length - 1;
      renderOptions();
      updateExplain();
      updateNavGrid();
    }

    function selectOption(index) {
      if (state.answers[state.current] !== null) {
        return;
      }
      state.answers[state.current] = index;
      render();
    }

    function resetQuiz() {
      state.current = 0;
      state.answers = Array(questions.length).fill(null);
      render();
    }

    prevBtn.addEventListener("click", () => {
      if (state.current > 0) {
        state.current -= 1;
        render();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (state.current < questions.length - 1) {
        state.current += 1;
        render();
      }
    });

    resetBtn.addEventListener("click", resetQuiz);
    resetTop.addEventListener("click", resetQuiz);

    buildNav();
    render();
  </script>
